aid: ndbc
name: NDBC — National Data Buoy Center
description: >-
  The NOAA National Data Buoy Center (NDBC) operates a global network of over
  1,000 moored buoys, drifting buoys, Coastal-Marine Automated Network (C-MAN)
  stations, and partner stations that continuously measure and transmit
  meteorological and oceanographic conditions. Real-time and historical data —
  wind direction and speed, wave height and period, sea surface temperature,
  atmospheric pressure, air temperature, dew point, visibility, and salinity —
  are distributed freely via HTTP file URLs, a THREDDS/OPeNDAP server (NetCDF),
  an RSS observation feed, and a latest-observations snapshot updated every
  five minutes. No API key or authentication is required; data is in the public
  domain under U.S. government open-data policy.
image: https://www.ndbc.noaa.gov/images/nws/nws_logo.png
url: https://raw.githubusercontent.com/api-evangelist/ndbc/refs/heads/main/apis.yml
access: 3rd-Party
created: '2026-06-13'
modified: '2026-06-13'
position: Consumer
specificationVersion: '0.19'
tags:
